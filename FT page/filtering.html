<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Data Grid Search, Filter, and Sort</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #1f2937;
      background: #f9fafb;
    }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }

    .hero {
      padding: 88px 0;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      color: #fff;
      text-align: center;
    }
    .hero-eyebrow,
    .section-eyebrow,
    .capabilities-eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.9;
    }
    .hero h1,
    .section-title,
    .capabilities-section h2 {
      font-size: clamp(32px, 4vw, 42px);
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero-description,
    .section-description,
    .demo-subtitle {
      font-size: 18px;
      max-width: 760px;
      margin: 0 auto 28px;
      opacity: 0.95;
    }
    .hero-ctas { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: #fff; color: #2563eb; }
    .btn-secondary { border: 1px solid #fff; color: #fff; }

    .demo-section,
    .why-matters,
    .faq,
    .related-articles {
      padding: 72px 0;
      background: #fff;
    }
    .demo-placeholder {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      color: #9ca3af;
      font-size: 18px;
      margin-top: 24px;
      background: #f9fafb;
    }

    .why-matters,
    .resources,
    .related-articles {
      border-top: 1px solid #e5e7eb;
    }
    .why-matters-wrapper {
      display: block;
      gap: 0;
    }
    .why-matters-text-large {
      font-size: 16px;
      color: #4b5563;
      margin-bottom: 22px;
    }
    .selection-types-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .selection-type-item {
      background: #eff6ff;
      color: #2563eb;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .why-matters-summary {
      font-size: 15px;
      color: #475569;
      line-height: 1.8;
      max-width: 760px;
      margin-bottom: 24px;
    }

    .capabilities-section,
    .resources {
      padding: 72px 0;
      background: #f8fafc;
    }
    .capabilities-grid,
    .resources-grid,
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .capability-card,
    .resource-card,
    .article-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      min-height: 340px;
    }
    .capability-card h3,
    .resource-card h4,
    .article-card h4 {
      margin-bottom: 14px;
      font-size: 20px;
      line-height: 1.2;
    }
    .capability-card p,
    .resource-card p,
    .article-card p {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 20px;
      line-height: 1.7;
    }
    .capability-bullets {
      list-style: none;
      padding: 0;
      margin: 0 0 22px;
      display: grid;
      gap: 12px;
    }
    .capability-bullets li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
    }
    .capability-bullets li::before {
      content: '✓';
      color: #16a34a;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .capability-card-footer {
      margin-top: auto;
      background: #eff6ff;
      border-radius: 18px;
      padding: 16px 18px;
      color: #1d4ed8;
      font-size: 14px;
      line-height: 1.6;
    }
    .resource-card a,
    .article-link {
      display: inline-block;
      margin-top: 14px;
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }
    .resource-card a:hover,
    .article-link:hover { text-decoration: underline; }

    .faq-container { max-width: 860px; margin: 28px auto 0; }
    .faq-item { border-bottom: 1px solid #e5e7eb; padding: 18px 0; }
    .faq-question {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .faq-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #eff6ff;
      color: #2563eb;
      font-size: 16px;
      transition: transform 0.2s ease;
    }
    .faq-item.open .faq-toggle { transform: rotate(45deg); }
    .faq-answer { display: none; margin-top: 10px; color: #4b5563; }
    .faq-item.open .faq-answer { display: block; }

    footer {
      padding: 28px 0 44px;
      text-align: center;
      color: #6b7280;
      background: #fff;
    }

    @media (max-width: 768px) {
      .hero { padding: 68px 0; }
      .why-matters-wrapper { grid-template-columns: 1fr; }
      .hero-ctas { flex-direction: column; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <section class="hero"></section>
  <section class="demo-section"></section>
  <section class="why-matters"></section>
  <section class="capabilities-section"></section>
  <section class="resources"></section>
  <section class="faq"></section>
  <section class="related-articles"></section>
  <footer>
    <div class="container">
      <p>© 2024 Syncfusion React Data Grid Search, Filter, and Sort.</p>
    </div>
  </footer>

  <script src="filtering.js"></script>
</body>
</html>
